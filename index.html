<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BT Command Center</title>
  <meta name="description" content="Bitcoin Timber Holdings — Daily Brief Command Center">
  <meta name="theme-color" content="#f7931a">
  <meta property="og:title" content="BT Command Center">
  <meta property="og:description" content="Bitcoin Timber Holdings — Daily Brief Command Center">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f7931a'/><text x='50' y='68' font-family='monospace' font-size='50' font-weight='900' fill='%23000' text-anchor='middle'>BT</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { min-height:100vh; background:#080808; }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes glow { 0%,100% { box-shadow: 0 0 8px rgba(247,147,26,0.2); } 50% { box-shadow: 0 0 20px rgba(247,147,26,0.4); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes countUp { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }
    button { font-family: inherit; cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    @media (max-width: 640px) {
      .top-bar-inner { flex-direction: column !important; gap: 10px !important; align-items: flex-start !important; }
      .btc-ticker { align-self: flex-start !important; }
      .stats-grid { grid-template-columns: 1fr !important; }
      .date-bar { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }
      .date-nav { width: 100% !important; justify-content: space-between !important; }
      .section-header-label { font-size: 11px !important; }
      .one-number-value { font-size: 52px !important; }
    }
    @media (min-width: 641px) and (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .one-number-value { font-size: 64px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const API_URL = "/api/brief";
    const BTC_API = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true";
    const BRIEF_REFRESH_MS = 5 * 60 * 1000;
    const BTC_REFRESH_MS = 60 * 1000;

    const SECTION_COLORS = {
      "YESTERDAY'S WORK": "#4ade80",
      "OPEN THREADS": "#fbbf24",
      "TODAY'S PRIORITIES": "#f7931a",
      "PIPELINE PULSE": "#818cf8",
      "ONE NUMBER": "#f7931a",
    };

    const PIPELINE_STATUS = {
      WARM: { color: "#fbbf24", bg: "rgba(251,191,36,0.1)", border: "rgba(251,191,36,0.25)" },
      ACTIVE: { color: "#4ade80", bg: "rgba(74,222,128,0.1)", border: "rgba(74,222,128,0.25)" },
      HOT: { color: "#f97316", bg: "rgba(249,115,22,0.1)", border: "rgba(249,115,22,0.25)" },
      STALLED: { color: "#f87171", bg: "rgba(248,113,113,0.1)", border: "rgba(248,113,113,0.25)" },
      COLD: { color: "#94a3b8", bg: "rgba(148,163,184,0.1)", border: "rgba(148,163,184,0.25)" },
      CLOSED: { color: "#6b7280", bg: "rgba(107,114,128,0.1)", border: "rgba(107,114,128,0.25)" },
    };

    /* — SVG Icons — */
    const Icon = ({ d, size = 14, color = "#fff", strokeWidth = 2 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
        <path d={d} />
      </svg>
    );

    const Icons = {
      zap: (p) => <Icon {...p} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
      activity: (p) => <Icon {...p} d="M22 12h-4l-3 9L9 3l-3 9H2" />,
      gitBranch: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 01-9 9"/></svg>,
      target: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      radio: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49"/><path d="M7.76 16.24a6 6 0 010-8.49"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M4.93 19.07a10 10 0 010-14.14"/></svg>,
      hash: (p) => <Icon {...p} d="M4 9h16M4 15h16M10 3l-2 18M16 3l-2 18" />,
      clock: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      trendUp: (p) => <Icon {...p} d="M23 6l-9.5 9.5-5-5L1 18" />,
      trendDown: (p) => <Icon {...p} d="M23 18l-9.5-9.5-5 5L1 6" />,
      chevDown: (p) => <Icon {...p} d="M6 9l6 6 6-6" />,
      chevRight: (p) => <Icon {...p} d="M9 18l6-6-6-6" />,
      chevLeft: (p) => <Icon {...p} d="M15 18l-6-6 6-6" />,
      refresh: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>,
      alert: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
      calendar: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      check: (p) => <Icon {...p} d="M20 6L9 17l-5-5" />,
    };

    const SECTION_ICONS = {
      "YESTERDAY'S WORK": Icons.activity,
      "OPEN THREADS": Icons.gitBranch,
      "TODAY'S PRIORITIES": Icons.target,
      "PIPELINE PULSE": Icons.radio,
      "ONE NUMBER": Icons.hash,
    };

    /* — Helpers — */
    function formatDateISO(d) {
      return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    }
    function shiftDate(isoStr, days) {
      const d = new Date(isoStr + "T12:00:00");
      d.setDate(d.getDate() + days);
      return formatDateISO(d);
    }
    function isToday(isoStr) { return isoStr === formatDateISO(new Date()); }
    function isFuture(isoStr) { return isoStr > formatDateISO(new Date()); }
    function relativeDay(isoStr) {
      const today = formatDateISO(new Date());
      const yesterday = shiftDate(today, -1);
      if (isoStr === today) return "Today";
      if (isoStr === yesterday) return "Yesterday";
      return null;
    }

    /* — Parsers (FIXED: case-insensitive matching) — */
    function parseBrief(text) {
      const sectionDefs = [
        { key: "YESTERDAY'S WORK", title: "Yesterday's Work" },
        { key: "OPEN THREADS", title: "Open Threads" },
        { key: "TODAY'S PRIORITIES", title: "Today's Priorities" },
        { key: "PIPELINE PULSE", title: "Pipeline Pulse" },
        { key: "ONE NUMBER", title: "One Number" },
      ];
      const lines = text.split("\n");
      const sections = [];
      let current = null;

      // Also skip lines that are just headers or meta
      const skipPatterns = [/^-{3,}$/, /^={3,}$/, /^⚡\s*BT\s*DAILY/i, /^Generated by/i, /^Revenue Snapshot/i, /^Today's Schedule/i];

      for (const line of lines) {
        const trimmed = line.trim();
        // FIXED: case-insensitive section matching
        const matched = sectionDefs.find((s) => trimmed.toUpperCase().includes(s.key));
        if (matched) {
          if (current) sections.push(current);
          current = { ...matched, lines: [] };
          continue;
        }
        if (current && trimmed && !skipPatterns.some(p => p.test(trimmed))) {
          current.lines.push(trimmed);
        }
      }
      if (current) sections.push(current);
      return sections;
    }

    function parsePipeline(lines) {
      return lines.map((line) => {
        const cleaned = line.replace(/^[-•🔥🟡🔴🟢]\s*/, "");
        let status = "ACTIVE";
        const upper = cleaned.toUpperCase();
        if (upper.includes("WARM") || cleaned.startsWith("🟡")) status = "WARM";
        if (upper.includes("STALLED")) status = "STALLED";
        if (upper.includes("CLOSED")) status = "CLOSED";
        if (upper.includes("COLD") || cleaned.startsWith("🔴")) status = "COLD";
        if (upper.includes("HOT") || cleaned.startsWith("🔥")) status = "HOT";
        // Extract name and detail
        const nameMatch = cleaned.replace(/^🔥|^🟡|^🔴|^🟢/, "").trim().match(/^(.+?)\s*[—(]/);
        const name = nameMatch ? nameMatch[1].trim() : cleaned.replace(/^🔥|^🟡|^🔴|^🟢/, "").split("—")[0].trim();
        const detailMatch = cleaned.match(/—\s*(.+)/);
        const detail = detailMatch ? detailMatch[1].trim() : "";
        return { name, status, detail, raw: cleaned };
      });
    }

    function parseOneNumber(lines) {
      const text = lines.join(" ");
      const match = text.match(/^(\d+[\.,]?\d*%?)\s*[—–\-]\s*(.*)/);
      if (match) return { number: match[1], caption: match[2] };
      const numMatch = text.match(/(\d+[\.,]?\d*%?)/);
      return {
        number: numMatch ? numMatch[1] : "—",
        caption: numMatch ? text.slice(text.indexOf(numMatch[1]) + numMatch[1].length).replace(/^\s*[—–\-]\s*/, "") : text,
      };
    }

    /* — Components — */
    function Grain() {
      return (
        <div style={{
          position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none", opacity: 0.035,
          backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,
        }} />
      );
    }

    function Scanline() {
      return (
        <div style={{
          position: "fixed", inset: 0, zIndex: 1, pointerEvents: "none", opacity: 0.03,
          background: "repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px)",
        }} />
      );
    }

    function BTCTicker({ price, change }) {
      const isUp = change >= 0;
      return (
        <div className="btc-ticker" style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "8px 14px", borderRadius: 6,
          background: "rgba(247,147,26,0.06)",
          border: "1px solid rgba(247,147,26,0.15)",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{
              width: 22, height: 22, borderRadius: 4,
              background: "#f7931a", display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 11, fontWeight: 800, color: "#000", fontFamily: "'Fira Code', monospace",
            }}>₿</div>
            <span style={{ fontFamily: "'Fira Code', monospace", fontSize: 14, fontWeight: 600, color: "#f7931a" }}>
              {price ? `$${price.toLocaleString()}` : "..."}
            </span>
          </div>
          {change !== null && (
            <div style={{
              display: "flex", alignItems: "center", gap: 3,
              fontSize: 11, fontWeight: 600, fontFamily: "'Fira Code', monospace",
              color: isUp ? "#4ade80" : "#f87171",
            }}>
              {isUp ? Icons.trendUp({ size: 12, color: "#4ade80" }) : Icons.trendDown({ size: 12, color: "#f87171" })}
              {Math.abs(change).toFixed(1)}%
            </div>
          )}
        </div>
      );
    }

    function StatusDot({ live, lastRefresh }) {
      const ago = lastRefresh ? Math.round((Date.now() - lastRefresh) / 1000) : null;
      const label = ago !== null ? (ago < 60 ? "just now" : `${Math.floor(ago/60)}m ago`) : "";
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10, fontFamily: "'Fira Code', monospace", color: "#444" }}
             title={`Last refreshed ${label}`}>
          <div style={{
            width: 6, height: 6, borderRadius: "50%",
            background: live ? "#4ade80" : "#f87171",
            animation: live ? "pulse 2s ease infinite" : "none",
          }} />
          <span>{live ? "LIVE" : "OFFLINE"}</span>
          {label && <span style={{ color: "#333" }}>• {label}</span>}
        </div>
      );
    }

    function DateNav({ currentDate, onPrev, onNext, onToday, hasNext, availableDates }) {
      const d = new Date(currentDate + "T12:00:00");
      const dayLabel = relativeDay(currentDate);
      const formatted = d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
      const hasBrief = !availableDates || availableDates.length === 0 || availableDates.includes(currentDate);
      return (
        <div className="date-nav" style={{
          display: "flex", alignItems: "center", gap: 8,
        }}>
          <button onClick={onPrev} style={{
            background: "rgba(255,255,255,0.04)", border: "1px solid #222", borderRadius: 6,
            padding: "6px 8px", color: "#888", display: "flex", alignItems: "center",
            transition: "all 0.15s",
          }} title="Previous day">
            {Icons.chevLeft({ size: 14, color: "#888" })}
          </button>

          <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
            {Icons.zap({ size: 14, color: "#f7931a" })}
            <span style={{
              fontFamily: "'Fira Code', monospace", fontSize: 13, fontWeight: 600,
              color: "#f7931a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
            }}>
              {dayLabel && <span style={{ color: "#fff", marginRight: 6 }}>{dayLabel} —</span>}
              {formatted}
            </span>
          </div>

          <button onClick={onNext} disabled={!hasNext} style={{
            background: hasNext ? "rgba(255,255,255,0.04)" : "transparent",
            border: `1px solid ${hasNext ? "#222" : "#151515"}`, borderRadius: 6,
            padding: "6px 8px", color: hasNext ? "#888" : "#333", display: "flex", alignItems: "center",
            opacity: hasNext ? 1 : 0.4, cursor: hasNext ? "pointer" : "default",
            transition: "all 0.15s",
          }} title="Next day">
            {Icons.chevRight({ size: 14, color: hasNext ? "#888" : "#333" })}
          </button>

          {!isToday(currentDate) && (
            <button onClick={onToday} style={{
              background: "rgba(247,147,26,0.1)", border: "1px solid rgba(247,147,26,0.25)", borderRadius: 6,
              padding: "4px 10px", fontFamily: "'Fira Code', monospace", fontSize: 10,
              fontWeight: 600, color: "#f7931a", letterSpacing: "0.05em",
              transition: "all 0.15s",
            }}>
              TODAY
            </button>
          )}
        </div>
      );
    }

    function SectionCard({ section, index, isExpanded, onToggle }) {
      const IconFn = SECTION_ICONS[section.key] || Icons.activity;
      const accentColor = SECTION_COLORS[section.key] || "#f7931a";

      if (section.key === "ONE NUMBER") {
        const { number, caption } = parseOneNumber(section.lines);
        return (
          <div style={{
            animation: `slideUp 0.5s ease ${index * 0.08}s both`,
            background: "linear-gradient(135deg, rgba(247,147,26,0.08) 0%, rgba(10,10,10,0.95) 60%)",
            border: "1px solid rgba(247,147,26,0.2)",
            borderRadius: 10, overflow: "hidden", position: "relative",
          }}>
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0, height: 2,
              background: `linear-gradient(90deg, transparent, ${accentColor}, transparent)`,
            }} />
            <div style={{ padding: "40px 24px", textAlign: "center" }}>
              <div style={{
                display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 20,
              }}>
                {Icons.hash({ size: 14, color: accentColor })}
                <span style={{
                  fontFamily: "'Fira Code', monospace", fontSize: 11, fontWeight: 600,
                  letterSpacing: "0.12em", textTransform: "uppercase", color: accentColor,
                }}>ONE NUMBER</span>
              </div>
              <div className="one-number-value" style={{
                fontFamily: "'Fira Code', monospace", fontSize: 80, fontWeight: 700,
                color: "#f7931a", lineHeight: 1, marginBottom: 12,
                textShadow: "0 0 60px rgba(247,147,26,0.3), 0 0 120px rgba(247,147,26,0.1)",
                animation: `countUp 0.6s ease ${index * 0.08}s both`,
              }}>{number}</div>
              <div style={{
                fontSize: 15, color: "#999", maxWidth: 400, margin: "0 auto", lineHeight: 1.5,
                fontFamily: "'DM Sans', sans-serif",
              }}>{caption}</div>
            </div>
          </div>
        );
      }

      if (section.key === "PIPELINE PULSE") {
        const deals = parsePipeline(section.lines);
        return (
          <div style={{
            animation: `slideUp 0.5s ease ${index * 0.08}s both`,
            background: "#0d0d0d", border: "1px solid #1a1a1a", borderRadius: 10, overflow: "hidden",
            position: "relative",
          }}>
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0, height: 2,
              background: `linear-gradient(90deg, transparent, ${accentColor}, transparent)`,
            }} />
            <button onClick={onToggle} style={{
              width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "14px 18px", background: "rgba(255,255,255,0.02)",
              border: "none", borderBottom: "1px solid #1a1a1a", color: "#e0e0e0",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{
                  width: 28, height: 28, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center",
                  background: `${accentColor}15`, border: `1px solid ${accentColor}30`,
                }}>
                  {IconFn({ size: 14, color: accentColor })}
                </div>
                <span className="section-header-label" style={{
                  fontFamily: "'Fira Code', monospace", fontSize: 12, fontWeight: 600,
                  letterSpacing: "0.06em",
                }}>{section.title.toUpperCase()}</span>
                <span style={{
                  fontFamily: "'Fira Code', monospace", fontSize: 10, color: "#555",
                  background: "#1a1a1a", padding: "2px 8px", borderRadius: 4,
                }}>{deals.length}</span>
              </div>
              {isExpanded ? Icons.chevDown({ size: 14, color: "#555" }) : Icons.chevRight({ size: 14, color: "#555" })}
            </button>
            {isExpanded && (
              <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
                {deals.map((deal, i) => {
                  const st = PIPELINE_STATUS[deal.status] || PIPELINE_STATUS.ACTIVE;
                  return (
                    <div key={i} style={{
                      display: "flex", alignItems: "stretch", gap: 12,
                      padding: "12px 14px", borderRadius: 8,
                      background: st.bg, border: `1px solid ${st.border}`,
                      animation: `fadeIn 0.3s ease ${i * 0.05}s both`,
                    }}>
                      <div style={{ width: 3, borderRadius: 2, background: st.color, flexShrink: 0 }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{
                          fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600,
                          color: "#e0e0e0", marginBottom: 4,
                        }}>{deal.name}</div>
                        <div style={{
                          fontFamily: "'Fira Code', monospace", fontSize: 11, color: "#888", lineHeight: 1.4,
                        }}>{deal.detail}</div>
                      </div>
                      <div style={{
                        fontFamily: "'Fira Code', monospace", fontSize: 10, fontWeight: 600,
                        color: st.color, background: `${st.color}15`,
                        padding: "3px 8px", borderRadius: 4, height: "fit-content",
                        border: `1px solid ${st.border}`,
                      }}>{deal.status}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      }

      /* Default section */
      return (
        <div style={{
          animation: `slideUp 0.5s ease ${index * 0.08}s both`,
          background: "#0d0d0d", border: "1px solid #1a1a1a", borderRadius: 10, overflow: "hidden",
          position: "relative",
        }}>
          <div style={{
            position: "absolute", top: 0, left: 0, right: 0, height: 2,
            background: `linear-gradient(90deg, transparent, ${accentColor}, transparent)`,
          }} />
          <button onClick={onToggle} style={{
            width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "14px 18px", background: "rgba(255,255,255,0.02)",
            border: "none", borderBottom: isExpanded ? "1px solid #1a1a1a" : "none",
            color: "#e0e0e0",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 28, height: 28, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center",
                background: `${accentColor}15`, border: `1px solid ${accentColor}30`,
              }}>
                {IconFn({ size: 14, color: accentColor })}
              </div>
              <span className="section-header-label" style={{
                fontFamily: "'Fira Code', monospace", fontSize: 12, fontWeight: 600,
                letterSpacing: "0.06em",
              }}>{section.title.toUpperCase()}</span>
              <span style={{
                fontFamily: "'Fira Code', monospace", fontSize: 10, color: "#555",
                background: "#1a1a1a", padding: "2px 8px", borderRadius: 4,
              }}>{section.lines.length}</span>
            </div>
            {isExpanded ? Icons.chevDown({ size: 14, color: "#555" }) : Icons.chevRight({ size: 14, color: "#555" })}
          </button>
          {isExpanded && (
            <div style={{ padding: "12px 18px" }}>
              {section.lines.map((line, i) => {
                const isArrow = line.startsWith("→") || line.startsWith("->") || /^\d+\./.test(line);
                const content = line.replace(/^[→\->•\-]\s*/, "").replace(/^\d+\.\s*/, "");
                return (
                  <div key={i} style={{
                    display: "flex", gap: 10, padding: "7px 0",
                    borderBottom: i < section.lines.length - 1 ? "1px solid #141414" : "none",
                    animation: `fadeIn 0.3s ease ${i * 0.03}s both`,
                  }}>
                    <span style={{
                      color: isArrow ? accentColor : "#444", flexShrink: 0, marginTop: 2,
                      fontWeight: isArrow ? 700 : 400, fontSize: 14,
                    }}>
                      {isArrow ? "→" : "›"}
                    </span>
                    <span style={{
                      fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#ccc", lineHeight: 1.5,
                      fontWeight: isArrow ? 500 : 400,
                    }}>{content}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* — App — */
    function App() {
      const [brief, setBrief] = useState(null);
      const [sections, setSections] = useState([]);
      const [expanded, setExpanded] = useState({});
      const [btcPrice, setBtcPrice] = useState(null);
      const [btcChange, setBtcChange] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [now, setNow] = useState(new Date());
      const [currentDate, setCurrentDate] = useState(formatDateISO(new Date()));
      const [lastRefresh, setLastRefresh] = useState(null);
      const [refreshing, setRefreshing] = useState(false);
      const [availableDates, setAvailableDates] = useState([]);
      const briefTimerRef = useRef(null);

      // Clock
      useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      // Fetch available dates
      useEffect(() => {
        fetch(`${API_URL}?list=true`)
          .then(r => r.json())
          .then(data => {
            if (data.dates && data.dates.length > 0) {
              setAvailableDates(data.dates);
              // If today has no brief, jump to latest available date
              const today = formatDateISO(new Date());
              if (!data.dates.includes(today) && data.dates.length > 0) {
                setCurrentDate(data.dates[0]); // most recent
              }
            }
          })
          .catch(() => {});
      }, []);

      // Fetch brief
      const fetchBrief = useCallback((date, opts = {}) => {
        const { silent } = opts;
        if (!silent) setLoading(true);
        else setRefreshing(true);

        const url = date ? `${API_URL}?date=${date}` : API_URL;
        fetch(url)
          .then((r) => r.json())
          .then((data) => {
            if (data.brief) {
              setBrief(data);
              const parsed = parseBrief(data.brief);
              setSections(parsed);
              if (!silent) {
                const exp = {};
                parsed.forEach((s) => (exp[s.key] = true));
                setExpanded(exp);
              }
              setError(null);
            } else {
              if (!silent) {
                setError("No brief found for this date");
                setSections([]);
                setBrief(null);
              }
            }
            setLastRefresh(Date.now());
            setLoading(false);
            setRefreshing(false);
          })
          .catch((e) => {
            if (!silent) { setError(e.message); setLoading(false); }
            setRefreshing(false);
          });
      }, []);

      // Initial load + auto-refresh
      useEffect(() => {
        fetchBrief(currentDate);
        if (briefTimerRef.current) clearInterval(briefTimerRef.current);
        if (isToday(currentDate)) {
          briefTimerRef.current = setInterval(() => {
            fetchBrief(currentDate, { silent: true });
          }, BRIEF_REFRESH_MS);
        }
        return () => { if (briefTimerRef.current) clearInterval(briefTimerRef.current); };
      }, [currentDate, fetchBrief]);

      // BTC ticker
      useEffect(() => {
        const fetchBTC = () => {
          fetch(BTC_API)
            .then((r) => r.json())
            .then((data) => {
              if (data.bitcoin) {
                setBtcPrice(data.bitcoin.usd);
                setBtcChange(data.bitcoin.usd_24h_change);
              }
            })
            .catch(() => {});
        };
        fetchBTC();
        const interval = setInterval(fetchBTC, BTC_REFRESH_MS);
        return () => clearInterval(interval);
      }, []);

      // Keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          if (e.key === "ArrowLeft") { e.preventDefault(); setCurrentDate(d => shiftDate(d, -1)); }
          if (e.key === "ArrowRight" && !isFuture(shiftDate(currentDate, 1))) {
            e.preventDefault(); setCurrentDate(d => shiftDate(d, 1));
          }
          if (e.key === "t" || e.key === "T") { setCurrentDate(formatDateISO(new Date())); }
          if (e.key === "r" || e.key === "R") { fetchBrief(currentDate, { silent: true }); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [currentDate, fetchBrief]);

      const toggleSection = (key) => setExpanded((prev) => ({ ...prev, [key]: !prev[key] }));

      const storedAt = brief?.stored_at ? new Date(brief.stored_at) : null;
      const briefDate = brief ? brief.date : currentDate;

      const priorityCount = sections.find((s) => s.key === "TODAY'S PRIORITIES")?.lines.length || 0;
      const threadCount = sections.find((s) => s.key === "OPEN THREADS")?.lines.length || 0;
      const pipelineLines = sections.find((s) => s.key === "PIPELINE PULSE")?.lines || [];
      const hotCount = pipelineLines.filter((l) => {
        const u = l.toUpperCase();
        return u.includes("WARM") || u.includes("ACTIVE") || u.includes("HOT") || l.startsWith("🔥");
      }).length;

      return (
        <div style={{
          minHeight: "100vh", background: "#080808", color: "#e0e0e0",
          fontFamily: "'DM Sans', sans-serif", position: "relative",
        }}>
          <Grain />
          <Scanline />

          {/* Top bar */}
          <div style={{
            position: "sticky", top: 0, zIndex: 50,
            background: "rgba(8,8,8,0.85)", backdropFilter: "blur(16px)",
            WebkitBackdropFilter: "blur(16px)",
            borderBottom: "1px solid #1a1a1a",
          }}>
            <div className="top-bar-inner" style={{
              maxWidth: 800, margin: "0 auto", padding: "12px 20px",
              display: "flex", alignItems: "center", justifyContent: "space-between",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 34, height: 34, borderRadius: 8,
                  background: "linear-gradient(135deg, #f7931a, #e67e00)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "'Fira Code', monospace", fontWeight: 800, fontSize: 14, color: "#000",
                  animation: "glow 3s ease infinite", flexShrink: 0,
                }}>BT</div>
                <div>
                  <div style={{
                    fontFamily: "'Fira Code', monospace", fontWeight: 700, fontSize: 13,
                    letterSpacing: "0.08em", color: "#fff",
                  }}>COMMAND CENTER</div>
                  <div style={{
                    fontFamily: "'Fira Code', monospace", fontSize: 10, color: "#555",
                    letterSpacing: "0.04em",
                  }}>BITCOIN TIMBER HOLDINGS</div>
                </div>
              </div>
              <BTCTicker price={btcPrice} change={btcChange} />
            </div>
          </div>

          <div style={{
            maxWidth: 800, margin: "0 auto", padding: "20px 20px 80px",
            position: "relative", zIndex: 2,
          }}>
            {/* Date nav + status bar */}
            <div className="date-bar" style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              marginBottom: 20, flexWrap: "wrap", gap: 10,
            }}>
              <DateNav
                currentDate={currentDate}
                onPrev={() => setCurrentDate(d => shiftDate(d, -1))}
                onNext={() => setCurrentDate(d => shiftDate(d, 1))}
                onToday={() => setCurrentDate(formatDateISO(new Date()))}
                hasNext={!isFuture(shiftDate(currentDate, 1))}
                availableDates={availableDates}
              />

              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <StatusDot live={!error && !loading} lastRefresh={lastRefresh} />

                <button onClick={() => fetchBrief(currentDate, { silent: true })} style={{
                  background: "rgba(255,255,255,0.04)", border: "1px solid #222", borderRadius: 6,
                  padding: "5px 8px", display: "flex", alignItems: "center", gap: 5, color: "#666",
                  fontFamily: "'Fira Code', monospace", fontSize: 10, transition: "all 0.15s",
                }} title="Refresh (R)">
                  <div style={{ animation: refreshing ? "spin 0.7s linear infinite" : "none" }}>
                    {Icons.refresh({ size: 12, color: "#666" })}
                  </div>
                </button>

                <div style={{
                  display: "flex", alignItems: "center", gap: 6,
                  fontFamily: "'Fira Code', monospace", fontSize: 10, color: "#444",
                }}>
                  {Icons.clock({ size: 10, color: "#444" })}
                  {now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}
                </div>
              </div>
            </div>

            {/* Brief count indicator */}
            {availableDates.length > 0 && (
              <div style={{
                display: "flex", alignItems: "center", gap: 6, marginBottom: 14,
                fontFamily: "'Fira Code', monospace", fontSize: 10, color: "#333",
              }}>
                {Icons.calendar({ size: 10, color: "#333" })}
                <span>{availableDates.length} brief{availableDates.length !== 1 ? "s" : ""} stored</span>
              </div>
            )}

            {/* Quick Stats */}
            {!loading && !error && (
              <div className="stats-grid" style={{
                display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10,
                marginBottom: 20, animation: "slideUp 0.4s ease both",
              }}>
                {[
                  { label: "PRIORITIES", value: priorityCount, color: "#f7931a", icon: Icons.target },
                  { label: "THREADS", value: threadCount, color: "#fbbf24", icon: Icons.gitBranch },
                  { label: "HOT DEALS", value: hotCount, color: "#4ade80", icon: Icons.trendUp },
                ].map(({ label, value, color, icon: StatIcon }, i) => (
                  <div key={i} style={{
                    background: "#0d0d0d", border: "1px solid #1a1a1a", borderRadius: 8,
                    padding: "14px 16px", textAlign: "center",
                  }}>
                    <div style={{ marginBottom: 6, display: "flex", justifyContent: "center" }}>
                      {StatIcon({ size: 14, color })}
                    </div>
                    <div style={{
                      fontFamily: "'Fira Code', monospace", fontSize: 26, fontWeight: 700,
                      color, lineHeight: 1, marginBottom: 4,
                    }}>{value}</div>
                    <div style={{
                      fontFamily: "'Fira Code', monospace", fontSize: 9,
                      letterSpacing: "0.1em", color: "#444",
                    }}>{label}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Loading */}
            {loading && (
              <div style={{
                display: "flex", flexDirection: "column", alignItems: "center",
                justifyContent: "center", minHeight: "50vh", gap: 16,
              }}>
                <div style={{
                  width: 36, height: 36, border: "3px solid #1a1a1a",
                  borderTopColor: "#f7931a", borderRadius: "50%",
                  animation: "spin 0.7s linear infinite",
                }} />
                <div style={{ fontFamily: "'Fira Code', monospace", fontSize: 12, color: "#444" }}>
                  LOADING BRIEF...
                </div>
              </div>
            )}

            {/* Error */}
            {error && (
              <div style={{
                textAlign: "center", padding: "80px 20px",
                animation: "fadeIn 0.4s ease both",
              }}>
                {Icons.alert({ size: 32, color: "#f87171" })}
                <div style={{
                  fontFamily: "'Fira Code', monospace", fontSize: 14, color: "#f87171",
                  marginTop: 12, marginBottom: 8,
                }}>{error}</div>
                <div style={{ fontSize: 13, color: "#444" }}>
                  {isToday(currentDate) ? "Run the daily brief to populate." : "No brief was stored for this date."}
                </div>
                {availableDates.length > 0 && (
                  <button onClick={() => setCurrentDate(availableDates[0])} style={{
                    marginTop: 16, background: "rgba(247,147,26,0.1)", border: "1px solid rgba(247,147,26,0.25)",
                    borderRadius: 6, padding: "8px 16px", fontFamily: "'Fira Code', monospace",
                    fontSize: 12, fontWeight: 600, color: "#f7931a",
                  }}>
                    Go to latest brief
                  </button>
                )}
              </div>
            )}

            {/* Sections */}
            {!loading && !error && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {sections.map((sec, i) => (
                  <SectionCard
                    key={sec.key}
                    section={sec}
                    index={i}
                    isExpanded={expanded[sec.key]}
                    onToggle={() => toggleSection(sec.key)}
                  />
                ))}
              </div>
            )}

            {/* Keyboard hints */}
            {!loading && !error && (
              <div style={{
                marginTop: 24, display: "flex", justifyContent: "center", gap: 16,
                animation: "fadeIn 0.6s ease 0.5s both",
              }}>
                {[
                  { key: "←→", label: "navigate days" },
                  { key: "T", label: "today" },
                  { key: "R", label: "refresh" },
                ].map(({ key, label }) => (
                  <div key={key} style={{
                    display: "flex", alignItems: "center", gap: 6,
                    fontFamily: "'Fira Code', monospace", fontSize: 10, color: "#2a2a2a",
                  }}>
                    <span style={{
                      background: "#141414", border: "1px solid #1e1e1e", borderRadius: 4,
                      padding: "2px 6px", fontSize: 9, color: "#444",
                    }}>{key}</span>
                    {label}
                  </div>
                ))}
              </div>
            )}

            {/* Footer */}
            <div style={{
              marginTop: 32, paddingTop: 20, borderTop: "1px solid #141414",
              textAlign: "center",
            }}>
              <div style={{
                fontFamily: "'Fira Code', monospace", fontSize: 10, color: "#2a2a2a",
                letterSpacing: "0.06em",
              }}>
                BT COMMAND CENTER • BITCOIN TIMBER HOLDINGS, LLC • {new Date().getFullYear()}
              </div>
              {storedAt && (
                <div style={{
                  fontFamily: "'Fira Code', monospace", fontSize: 9, color: "#1e1e1e",
                  marginTop: 4,
                }}>
                  brief generated {storedAt.toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
